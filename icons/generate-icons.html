<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Icons</title>
</head>
<body>
  <h1>Icon Generator</h1>
  <p>Opening this file will generate PNG icons for the extension.</p>
  <canvas id="canvas" width="128" height="128"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Create gradient
    const gradient = ctx.createLinearGradient(0, 0, 128, 128);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(1, '#764ba2');
    
    // Draw circle
    ctx.beginPath();
    ctx.arc(64, 64, 60, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Draw book
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.fillRect(35, 45, 60, 50);
    
    // Book lines
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    ctx.beginPath();
    ctx.moveTo(35, 45);
    ctx.lineTo(55, 45);
    ctx.lineTo(55, 65);
    ctx.lineTo(75, 65);
    ctx.lineTo(75, 45);
    ctx.lineTo(95, 45);
    ctx.stroke();
    
    // Download links
    const sizes = [16, 48, 128];
    sizes.forEach(size => {
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.textContent = `Download icon${size}.png`;
      link.style.display = 'block';
      link.style.margin = '10px';
      
      const smallCanvas = document.createElement('canvas');
      smallCanvas.width = size;
      smallCanvas.height = size;
      const smallCtx = smallCanvas.getContext('2d');
      smallCtx.drawImage(canvas, 0, 0, size, size);
      
      link.href = smallCanvas.toDataURL('image/png');
      document.body.appendChild(link);
    });
  </script>
</body>
</html>
